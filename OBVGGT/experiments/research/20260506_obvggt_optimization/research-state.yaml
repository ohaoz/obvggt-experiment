project: obvggt_optimization_20260506
branch: exp/2026-0506-obvggt-research-opt
base_branch: exp/2026-0503-infra-runtime-accel
status: non_algorithm_protocol_complete
created_at: 2026-05-06
objective: >
  Research and prioritize further OBVGGT optimizations beyond the accepted
  RoPE fallback component cache and video_depth depth-only runtime mode,
  without changing the core OBCache/OBVGGT algorithm.
constraints:
  - do_not_change_obcache_core_algorithm
  - obvggt_is_obcache_based_keep_policy_semantics_fixed
  - do_not_touch_dirty_main_worktree
  - server_runs_must_use_conda_obvggt
  - no_sudo
  - no_system_disk_outputs
  - every_remote_run_requires_record_and_local_sync
  - paired_rerun_required_for_fps_claim
scope:
  allowed_now:
    - same_algorithm_existing_config_validation
    - inference_infra_and_kernel_selection
    - profiling_and_backend_preflight_logs
    - task_runtime_fairness_for_video_depth
    - eval_io_wallclock_optimization_with_formal_fps_separated
    - scoring_microbench_diagnostics_without_eviction_policy_change
  out_of_scope_now:
    - layer_adaptive_budget
    - query_aware_probe_or_page_selection
    - new_eviction_policy_or_scoring_formula
    - token_pruning_or_token_merging
    - kv_quantization_runtime_cache
    - score_interval_as_same_budget_claim
