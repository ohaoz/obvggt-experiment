  accepted_infra:
    name: pytorch_rope2d_fallback_component_cache
    evidence: rope_fallback_full_matrix_20260504.csv
    fps_gain: "Sintel +14.04%, Bonn +8.21%, KITTI +5.56%"
    quality_delta: "none"
    budget_delta: "none"
  accepted_task_runtime:
    name: video_depth_depth_only
    evidence: depth_only_full_matrix_20260504.csv
    fps_gain: "Sintel +10.27%, Bonn +13.14%, KITTI +18.94%"
