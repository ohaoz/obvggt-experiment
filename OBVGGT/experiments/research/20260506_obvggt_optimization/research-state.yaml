next_hypotheses:
  - id: H1
    name: best_infra_plus_probe6
    class: low_risk_existing_config
    priority: rejected
    scope_note: "Allowed only as existing-configuration validation; do not change OBCache policy."
    prediction: "Probe6 may recover most of probe4 speed while reducing quality risk."
    gate: "Failed 2026-05-06 Bonn balloon2 40-frame smoke; do not promote to Bonn full."
    result: "FPS 5.0544 -> 4.3749 (-13.44%) with cache_max=5020 and seq_max=6024 unchanged."
  - id: H1b
    name: best_infra_plus_probe4
    class: low_risk_existing_config
    priority: rejected
    scope_note: "Allowed only as existing-configuration validation; do not change OBCache policy."
    gate: "Failed 2026-05-06 Bonn balloon2 40-frame smoke; do not promote to Bonn full."
    result: "FPS 5.0544 -> 4.9659 (-1.75%) with cache_max=5020 and seq_max=6024 unchanged."
  - id: H2
    name: best_infra_plus_depth_only_cross_baseline
    class: task_runtime_fairness
    priority: P0
    scope_note: "Task-output contract only; not an OBCache algorithm improvement."
    prediction: "Depth-only should improve all video_depth baselines when applied consistently."
    gate: "StreamVGGT/XStreamVGGT/InfiniteVGGT same-contract rerun."
  - id: H3
    name: eval_io_wallclock_split_and_fast_mode
    class: non_algorithm_runtime
    priority: P1
    scope_note: "Allowed only if reported as wall-clock/evaluation throughput; formal model FPS is separate."
    prediction: "save_depth_maps colorization/PNG/Numpy writes may dominate wall clock after model-side gains."
    gate: "No change to result_scale metrics; formal_fps_valid remains from model-only timing; report wall-clock separately."
  - id: H4
    name: cuda_graph_or_regional_compile_feasibility_probe
    class: infra_research
    priority: P1
    scope_note: "Allowed only as opt-in prototype/microbench; no default change without paired evidence."
    prediction: "Static-ish shapes may allow partial graph/compile gains, but dynamic cache and Python loops may block."
    gate: "Import-safe, opt-in only, compile cold-start measured separately, full paired smoke if runtime win appears."
  - id: H5
    name: scoring_implementation_microbench
    class: diagnostics_only
    priority: P2
    scope_note: "No formula/policy change. Any precision/layout variant is diagnostic until keep indices match ctrl."
    prediction: "OBCache scoring overhead may be reducible by implementation details, but eviction decisions must stay stable."
    gate: "Keep-index overlap and quality parity before any end-to-end run; otherwise reject as algorithm-changing."
  - id: H6
    name: backend_preflight_logging_expansion
    class: instrumentation
    priority: P2
    scope_note: "Logging only; do not force backend defaults without paired smoke evidence."
    prediction: "SDPA/CUDNN/TF32/autocast backend evidence will prevent false infra conclusions."
    gate: "One-time logs per run, no measurable overhead in formal timing."
